name: test img

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nndda/another-test-image:latest
      credentials:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - run: |
          git clone https://github.com/nndda/nnda.dev.git --depth 1 && \
          cp -r ./* /nnda.dev/ && \
          cd /nnda.dev && \
          source ./bin/activate

      - run: bun --version
      - run: python --version
      - run: ls -l ./
      - run: bun run build
